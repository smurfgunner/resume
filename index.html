<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vahid as iOS Engineer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://www.gstatic.com/firebasejs/9.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.12.0/firebase-analytics-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="top-container">
        <!-- Personal Info (Column A Section) -->
        <section class="personal-info">
          <div id="personal-info-container"></div>
        </section>
        
        <!-- Professional Summary (Column B Section) -->
        <section class="summary">
          <h2>Professional Summary</h2>
          <div id="summary-container"></div>
        </section>
        
        <!-- Interests Section (within Professional Summary) -->
        <section class="interests">
          <h2>Interests</h2>
          <div id="interests-container"></div>
        </section>
      </div>
      
      <div class="columns">
        <!-- Work History (Column B Section) -->
        <section class="work-history">
          <h2>Work History</h2>
          <div id="work-history-container"></div>
          
          <!-- Personal Projects Section -->
          <section class="projects">
            <h2>Personal Projects</h2>
            <div id="projects-container"></div>
          </section>

          <!-- Earlier Experience -->
          <section class="earlier-experience">
            <h2 class="earlier-heading">Earlier Experience</h2>
            <div class="earlier-content">
              <div class="earlier-subsection">
                <h4 class="earlier-subheading">Work History</h4>
                <div id="earlier-work-history-container"></div>
              </div>
              <div class="earlier-subsection">
                <h4 class="earlier-subheading">Personal Projects</h4>
                <div id="earlier-projects-container"></div>
              </div>
            </div>
          </section>
        </section>
        
        
        <!-- Skills (Column A Section) -->
        <section class="skills">
          <h2>Skills</h2>
          <div id="skills-container"></div>
          
          <!-- Education (Column A Section) -->
          <section class="education">
            <h2>Education</h2>
            <div id="education-container"></div>
          </section>
          
          <section class="coffee-invite">
            <h2>Interested?</h2>
            <p>Let's grab a cup of coffee.</p>
            <button id="coffee-btn">Sure!</button>
          </section>

        </section>
      </div>
    </div>
    
    <script type="module" src="main.js"></script>
  </body>
</html>
